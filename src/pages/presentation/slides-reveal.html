<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vibe coding - 氛围编程</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4/theme/white.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4/plugin/highlight/monokai.css">
    <style>
        .reveal {
            font-family: 'PingFang SC', 'Source Han Sans CN', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .reveal h1 {
            color: #0066cc;
            font-size: 2.5em;
        }

        .reveal h2 {
            color: #1a1a1a;
            font-size: 2em;
        }

        .reveal h3 {
            color: #333333;
        }

        .reveal li {
            font-size: 1.2em;
            line-height: 1.6;
        }

        .reveal strong {
            color: #0066cc;
        }

        .reveal blockquote {
            background: #f8f8f8;
            border-left: 4px solid #0066cc;
            padding: 20px;
            color: #333;
        }

        .reveal code {
            background: #f5f5f5;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #0066cc;
        }

        .reveal pre {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #0066cc;
        }

        .reveal pre code {
            background: none;
            color: #333;
        }

        .highlight-red {
            color: #cc0000;
            font-weight: bold;
        }

        .highlight-green {
            color: #009933;
            font-weight: bold;
        }

        .highlight-blue {
            color: #0066cc;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            <section data-markdown="slides-reveal.md" data-separator="^\n---\n$"></section>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4/plugin/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4/plugin/highlight/highlight.js"></script>

    <script>
        Reveal.initialize({
            plugins: [RevealMarkdown, RevealHighlight],
            hash: true,
            slideNumber: true,
            transition: 'slide',
            transitionSpeed: 'default',
            center: true,
            margin: 0.1
        });
    </script>
</body>
</html>
