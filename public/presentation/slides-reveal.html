<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vibe coding - 氛围编程</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4/theme/white.css">
    <style>
        .reveal {
            font-family: 'PingFang SC', 'Source Han Sans CN', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .reveal h1 {
            color: #0066cc;
            font-size: 2.5em;
        }

        .reveal h2 {
            color: #1a1a1a;
            font-size: 2em;
        }

        .reveal h3 {
            color: #333333;
        }

        .reveal li {
            font-size: 1.1em;
            line-height: 1.5;
            margin: 0.5em 0;
        }

        .reveal strong {
            color: #0066cc;
        }

        .reveal blockquote {
            background: #f8f8f8;
            border-left: 4px solid #0066cc;
            padding: 20px;
            color: #333;
            text-align: left;
        }

        .reveal pre {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #0066cc;
            font-size: 0.6em;
        }

        .fragment {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .fragment.visible {
            opacity: 1;
        }

        /* Make images centered and responsive */
        .reveal section img {
            display: block;
            margin: 0.6em auto;
            max-width: 100%;
            max-height: 70vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">

            <!-- Markdown slides (single source of truth) -->
            <section data-markdown="/presentation/slides.md" data-separator="^\n---\n$" data-separator-vertical="^\n--\n$"></section>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4/plugin/markdown/markdown.js"></script>
    <script>
        Reveal.initialize({
            plugins: [RevealMarkdown],
            hash: true,
            slideNumber: true,
            transition: 'slide',
            transitionSpeed: 'slow',
            center: true,
            margin: 0.15,
            minScale: 0.3,
            maxScale: 1.5,
            keyboard: true,
            touch: true,
            overview: true
        });
    </script>
</body>
</html>
