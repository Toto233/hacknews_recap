<div class="page">
  <div class="chrome"><span>start early</span><span>04 / 14</span></div>
  <div class="kicker">别被起步焦虑困住</div>
  <h1 class="title-lg">不是先把一切想清楚再上手，<br>而是先做一个会用到的东西</h1>
  <div class="grid2" style="margin-top:56px">
    <div class="card">
      <h3>很多人卡住的方式</h3>
      <ul class="list">
        <li>模型没研究透</li>
        <li>工具没选明白</li>
        <li>工作流没搭完善</li>
        <li>理论没系统掌握</li>
      </ul>
    </div>
    <div class="card">
      <h3>真正值钱的是</h3>
      <ul class="list">
        <li>越早开始，越早拥有试错时间</li>
        <li>怎么描述问题、给上下文、拆任务</li>
        <li>怎么回滚、沉淀、复用</li>
        <li>用流程替代情绪，把偶然成功变成可重复成功</li>
      </ul>
    </div>
  </div>
  <div class="foot"><span>完美主义很容易伪装成高级拖延</span><span>Start Early</span></div>
