<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>09 · Rollback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
</head>
<body class="dark">
<div class="page">
  <div class="chrome"><span>rollback</span><span>09 / 14</span></div>
  <div class="kicker">经验之一</div>
  <h1 class="title-lg">别先想着让 AI 永远不犯错，<br>先让自己随时能回头</h1>
  <div class="grid2" style="margin-top:56px">
    <div class="card">
      <h3>工程动作</h3>
      <ul class="list">
        <li>每到可运行状态就 commit 一次</li>
        <li>大改动走分支</li>
        <li>先看 diff</li>
        <li>再跑测试，再合并</li>
      </ul>
    </div>
    <div class="card">
      <h3>核心判断</h3>
      <p>安全感不应该建立在“它不会错”上，而应该建立在“就算它错了，我也随时能回头”上。</p>
    </div>
  </div>
  <div class="foot"><span>Git 不是附属工具，是安全带</span><span>Rollback First</span></div>
</div>
</body>
</html>
