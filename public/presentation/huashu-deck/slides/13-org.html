<div class="page">
  <div class="chrome"><span>organization</span><span>13 / 14</span></div>
  <div class="kicker">把视角从个人抬到组织</div>
  <h1 class="title-lg">所有人的能力都提高了，<br>组织的能力就会提高吗？</h1>
  <div class="rule"></div>
  <p class="lead measure-medium">“你能在任何地方看到计算机时代，除了生产率统计里。”</p>
  <div class="grid2" style="margin-top:32px">
    <div class="card">
      <h3>AI 很强</h3>
      <p>写东西能帮，查资料能帮，写代码能帮，总结分析能帮，自动化也开始能帮。个人层面的提效，已经很真实了。</p>
    </div>
    <div class="card">
      <h3>组织未必一起变快</h3>
      <p>新技术的能力，要穿过旧流程、旧 KPI、旧审批和部门墙，才能真正变成生产力。问题不在工具，问题在结构。</p>
    </div>
  </div>
  <div class="foot"><span>Tool upgrade ≠ productivity upgrade</span><span>Solow</span></div>
</div>
