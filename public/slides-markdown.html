<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vibe coding - 氛围编程</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4/theme/white.css">
    <style>
        /* 基础设置 */
        .reveal {
            font-family: 'PingFang SC', 'Source Han Sans CN', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
        }

        /* 背景设置 - 纯白 */
        .reveal .slides {
            background: #ffffff;
        }

        /* 标题样式 */
        .reveal h1 {
            color: #1890ff;
            font-size: 60pt;
            font-weight: bold;
            margin-bottom: 80px;
            text-align: center;
            letter-spacing: 2px;
        }

        .reveal h2 {
            color: #1890ff;
            font-size: 48pt;
            font-weight: bold;
            margin-bottom: 60px;
            text-align: center;
        }

        .reveal h3 {
            color: #333333;
            font-size: 36pt;
            font-weight: bold;
            margin-bottom: 40px;
            text-align: center;
        }

        /* 正文和列表样式 */
        .reveal p {
            font-size: 32pt;
            color: #333333;
            margin: 30px 0;
            line-height: 1.6;
            text-align: center;
        }

        .reveal ul, .reveal ol {
            font-size: 32pt;
            color: #333333;
            margin: 40px 0;
            text-align: left;
            padding-left: 60px;
        }

        .reveal li {
            margin: 25px 0;
            line-height: 1.8;
        }

        /* 强调色 */
        .reveal strong {
            color: #1890ff;
            font-weight: bold;
        }

        /* 引用样式 */
        .reveal blockquote {
            background: #f5f5f5;
            border-left: 6px solid #1890ff;
            padding: 40px 60px;
            color: #333333;
            font-size: 36pt;
            font-style: italic;
            margin: 60px auto;
            max-width: 80%;
        }

        /* 图片样式 - 大图居中 */
        .reveal img {
            max-width: 80%;
            max-height: 400px;
            margin: 40px auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        /* 分隔线 */
        .reveal hr {
            border: none;
            border-top: 2px solid #e0e0e0;
            margin: 80px auto;
            width: 60%;
        }

        /* 代码块样式 */
        .reveal pre {
            background: #f5f5f5;
            padding: 40px;
            border-radius: 8px;
            font-size: 24pt;
            line-height: 1.6;
            margin: 40px auto;
            max-width: 90%;
            border-left: 4px solid #1890ff;
        }

        .reveal code {
            background: #f5f5f5;
            padding: 4px 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #1890ff;
            font-size: 28pt;
        }

        .reveal pre code {
            background: none;
            color: #333333;
            padding: 0;
        }

        /* 幻灯片间距 - 增加留白 */
        .reveal .slides section {
            padding: 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 减少每页内容，增加留白 */
        .reveal section {
            text-align: center;
        }

        /* 进度条样式 */
        .reveal .progress {
            background: #1890ff;
            height: 4px;
        }

        /* 页码样式 */
        .reveal .slide-number {
            color: #999999;
            font-size: 24pt;
        }

        /* 红色叉号 */
        .reveal li::marker {
            color: #ff4d4f;
            font-size: 36pt;
        }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            <section data-markdown="/presentation/slides.md" data-separator="^\n---\n$" data-separator-vertical="^\n--\n$"></section>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4/plugin/markdown/markdown.js"></script>

    <script>
        Reveal.initialize({
            plugins: [RevealMarkdown],
            hash: true,
            slideNumber: true,
            transition: 'slide',
            transitionSpeed: 'slow',
            center: true,
            margin: 0.15,
            minScale: 0.3,
            maxScale: 1.5,
            keyboard: true,
            touch: true,
            overview: true
        });
    </script>
</body>
</html>
